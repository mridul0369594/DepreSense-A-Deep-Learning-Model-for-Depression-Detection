# ── DepreSense Backend — Local Development ─────────────────
# Usage:
#   docker-compose up          (foreground)
#   docker-compose up -d       (detached)
#   docker-compose down        (stop)

version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: depresense-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount source code for hot-reload
      - .:/app
      # Mount the model & assets from the parent repo
      - ../output:/output
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
