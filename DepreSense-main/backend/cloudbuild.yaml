# Cloud Build configuration for DepreSense Backend
# Run from DepreSense-main/ directory:
#   gcloud builds submit --config backend/cloudbuild.yaml .

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/depresense-backend:latest'
      - '-f'
      - 'backend/Dockerfile.production'
      - '.'

images:
  - 'gcr.io/$PROJECT_ID/depresense-backend:latest'

timeout: '1200s'
